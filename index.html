<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arbre Généalogique</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>

  <main id="app">

    <!-- Conteneur du graph Cytoscape -->
    <div id="cy"></div>

    <!-- Panneau latéral -->
    <aside id="panel" class="panel--hidden">

      <!-- Vue menu : actions sur la personne -->
      <div id="panel-menu">
        <h2 id="panel-name">Marie Dupont</h2>
        <p id="panel-dates" class="panel-dates"></p>
        <div class="menu-actions">
          <button id="btn-edit">✏️ Modifier</button>
          <button id="btn-add-parent">⬆️ + Parent</button>
          <button id="btn-add-child">⬇️ + Enfant</button>
          <button id="btn-add-spouse">💑 + Conjoint</button>
          <button id="btn-delete">🗑 Supprimer</button>
        </div>
      </div>

      <!-- Vue formulaire : créer / éditer -->
      <div id="panel-form" class="panel--hidden">
        <button id="btn-back">← Retour</button>
        <h2 id="form-title">Nouvelle personne</h2>
        <form id="person-form" autocomplete="off">

          <div id="other-parent-group" style="display:none">
            <label for="select-other-parent">Autre parent</label>
            <select id="select-other-parent">
              <option value="">Aucun</option>
            </select>
          </div>

          <label for="input-firstname">Prénom</label>
          <input type="text" id="input-firstname" placeholder="Marie" required />

          <label for="input-lastname">Nom</label>
          <input type="text" id="input-lastname" placeholder="Dupont" />

          <label for="input-birth">Date de naissance</label>
          <input type="text" id="input-birth" placeholder="12/03/1942" />

          <label for="input-death">Date de décès</label>
          <input type="text" id="input-death" placeholder="—" />

          <button type="submit" id="btn-save">Enregistrer</button>
        </form>
      </div>

    </aside>

    <!-- Boutons sauvegarde -->
    <div id="save-bar">
      <button id="btn-export">💾 Exporter</button>
      <label id="btn-import-label" for="input-import">📂 Importer</label>
      <input type="file" id="input-import" accept=".json" />
    </div>

  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
